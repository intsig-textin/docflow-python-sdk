        both regular fields and table fields
      operationId: deleteCategoryFields
      tags:
        - File Category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                workspace_id:
                  type: string
                  description: Workspace ID
                  example: '1234567890'
                category_id:
                  type: string
                  description: File category ID
                  example: '1234567890'
                field_ids:
                  type: array
                  description: List of field IDs to delete
                  items:
                    type: string
                  example:
                    - '1234567890'
                    - 0987654321
                table_id:
                  type: string
                  description: >
