          description: Workspace name
          example: My Workspace
        description:
          type: string
          description: Workspace description
          example: This is a workspace for invoice processing
        auth_scope:
          type: integer
          description: >-
            Collaboration scope 0: Visible only to self 1: Visible to enterprise
            members
          example: 1
          enum:
            - 0
            - 1
        manage_account_id:
          type: string
          description: Workspace administrator ID
          example: admin_123456
        manage_account_name:
          type: string
          description: Workspace administrator name
          example: John Doe
        callback_url:
          type: string
          description: Callback URL
          example: 'https://example.com/callback'
        callback_retry_time:
          type: integer
          description: Callback retry count
          example: 3
      required:
        - workspace_id
        - name
    CategoryFieldConfig:
      type: object
      properties:
        name:
          type: string
          description: Field name
          example: Invoice Code
        description:
          type: string
          description: Field description
          example: Invoice code description
        prompt:
          type: string
          description: Semantic extraction prompt
        use_prompt:
          type: boolean
          description: Whether to use semantic prompt
        alias:
          type: array
          description: Field aliases
          items:
            type: string
        identity:
          type: string
          description: Export field name
        multi_value:
          type: boolean
          description: Whether to enable multi-value extraction
        duplicate_value_distinct:
          type: boolean
          description: >-
            Whether to deduplicate values, only effective when multi_value is
            true
        transform_settings:
          type: object
          description: Transform configuration
          properties:
            type:
              type: string
              description: Transform type
              enum:
                - datetime
                - enumerate
                - regex
            datetime_settings:
              type: object
              description: Datetime type transform configuration
              properties:
                format:
                  type: string
                  description: >-
                    Date time format, refer to DocFlow date format guide
                    (https://docflow.textin.com/markdown?key=dateFormatGuide)
                  example: 'yyyy-MM-dd HH:mm:ss'
            enumerate_settings:
              type: object
              description: Enumeration type transform configuration
              properties:
                items:
                  type: array
                  description: List of available enumeration values
                  items:
                    type: string
            regex_settings:
              type: object
              description: Regex type transform configuration
              properties:
                match:
                  type: string
                  description: Regex pattern for matching
                  example: '^\d{4}-\d{2}-\d{2}$'
                replace:
                  type: string
                  description: Regex pattern for replacement
                  example: $1-$2-$3
            mismatch_action:
              type: object
              description: Action when field value does not match
              properties:
                mode:
                  type: string
                  description: Mismatch handling mode
                  enum:
                    - default
                    - warning
                default_value:
                  type: string
                  description: Default value when mode is default
