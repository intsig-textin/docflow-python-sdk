          type: string
          description: >
            Extraction model

            - Model 1: Fast speed with stable extraction results

            - Model 2: Suitable for complex document understanding

            - Model 3: VLM, suitable for simple extraction

            - mixed: Only in responses, indicates different models are used
            across fields/tables in this category
          example: Model 1
          enum:
            - Model 1
