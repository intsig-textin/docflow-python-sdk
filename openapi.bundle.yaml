  /api/app-api/sip/platform/v2/category/fields/add:
    post:
      summary: Add File Category Field
      description: >-
        Add a field to the specified file category, supporting both regular
        fields and table fields
      operationId: addCategoryField
      tags:
        - File Category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/CategoryFieldConfig'
              type: object
              properties:
                workspace_id:
                  type: string
                  description: Workspace ID
                  example: '1234567890'
                category_id:
                  type: string
                  description: File category ID
                  example: '1234567890'
                table_id:
                  type: string
                  description: >
                    Table ID

                    - Not provided or empty: Create a regular field, result will
                    appear in result.fields

                    - Provided table ID: Create a table field under the
                    corresponding table, result will appear in
                    result.tables[].fields
                  example: '1234567890'
                extract_model:
                  type: string
                  description: >
                    Optional, field-level extraction model, only supported for
                    regular fields (not table fields), defaults to Model 1 if
                    not specified

                    - Model 1: Fast speed with stable extraction results

                    - Model 2: Suitable for complex document understanding

                    - Model 3: VLM, suitable for simple extraction
                  example: Model 1
                  enum:
                    - Model 1
                    - Model 2
                    - Model 3
              required:
                - workspace_id
                - category_id
                - name
      responses:
        '200':
          description: Successfully added file category field
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/CodeMessage'
                  - type: object
                    properties:
                      result:
                        type: object
                        properties:
                          field_id:
                            type: string
                            description: Newly created field ID
                            example: '1234567890'
  /api/app-api/sip/platform/v2/category/fields/update:
    post:
