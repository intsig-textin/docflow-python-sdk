    ExtractFieldReqVO:
      type: object
      properties:
        key:
          type: string
          description: Field name
          example: Invoice Code
        prompt:
          type: string
          description: Field prompt
          example: Only keep the year part
        extract_model:
          type: string
          description: >
            Field-level extraction model, defaults to Model 1 if not specified

            - Model 1: Fast speed with stable extraction results

            - Model 2: Suitable for complex document understanding

            - Model 3: VLM, suitable for simple extraction

            Note: For table fields, the extraction model is determined by the
            table-level extract_model, this field is ignored
          example: Model 1
          enum:
            - Model 1
            - Model 2
            - Model 3
    DocumentParserParam:
      type: object
      properties:
        formula_level:
          type: integer
          description: >-
            Formula recognition level (0 recognizes both display and inline
            formulas, 1 recognizes display formulas only, 2 recognizes no
            formulas)
          example: 0
        apply_merge:
          type: integer
          description: 'Merge cross-page paragraphs and tables (0 no, 1 yes)'
          example: 1
        table_text_split_mode:
          type: integer
          description: 'Split text blocks crossed by table lines (0 no, 1 yes)'
          example: 0
        crop_dewarp:
          type: integer
          description: 'Crop and dewarp (0 no, 1 yes)'
          example: 0
        remove_watermark:
          type: integer
          description: 'Remove watermark (0 no, 1 yes)'
          example: 0
