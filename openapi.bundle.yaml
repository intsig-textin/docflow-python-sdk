        regular fields and table fields
      operationId: updateCategoryField
      tags:
        - File Category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/CategoryFieldConfig'
              type: object
              properties:
                workspace_id:
                  type: string
                  description: Workspace ID
                  example: '1234567890'
                category_id:
                  type: string
                  description: File category ID
                  example: '1234567890'
                field_id:
                  type: string
                  description: Field ID
                  example: '1234567890'
                table_id:
                  type: string
                  description: >
                    Table ID

                    - Not required for regular fields

                    - Required for table fields, need to provide the table ID it
                    belongs to
                  example: '1234567890'
                extract_model:
                  type: string
                  description: |
                    Field-level extraction model
                    - Model 1: Fast speed with stable extraction results
                    - Model 2: Suitable for complex document understanding
                    - Model 3: VLM, suitable for simple extraction
                  example: Model 1
                  enum:
                    - Model 1
                    - Model 2
                    - Model 3
              required:
                - workspace_id
                - category_id
                - field_id
      responses:
        '200':
          description: Successfully updated file category field
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CodeMessage'
