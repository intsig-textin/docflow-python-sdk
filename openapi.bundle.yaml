components:
  parameters:
    WorkspaceId:
      name: workspace_id
      in: query
      description: Workspace ID
      required: true
      schema:
        type: string
        example: 1234567890
    Category:
      name: category
      in: query
      description: File Category
      required: false
      schema:
        type: string
        example: invoice
    BatchNumber:
      name: batch_number
      in: query
      description: >
        Batch Number.            You can upload multiple times with the same
        batch number, and later retrieve processing results for multiple files
        in that batch using the batch number.            If the value is empty,
        the system automatically generates a string up to 20 characters long.
      required: false
      schema:
        type: string
        example: 202412190001
    AutoVerifyVat:
      name: auto_verify_vat
      in: query
      description: Whether to automatically verify VAT invoice
      required: false
      schema:
        type: boolean
        default: false
    SplitFlag:
      name: split_flag
      in: query
      description: Whether to perform file splitting
      required: false
      schema:
        type: boolean
        default: false
    CropFlag:
      name: crop_flag
      in: query
      description: Whether to perform multi-image cropping
      required: false
      schema:
        type: boolean
        default: false
    TargetProcess:
      name: target_process
      in: query
      description: >
        Target processing type.            Optional values:            -
        classify: Classification            - extract: Extraction
      required: false
      schema:
        type: string
        enum:
          - classify
          - extract
        example: classify
    ParserRemoveWatermark:
      name: parser_remove_watermark
      in: query
      description: 'Remove watermark (0 no, 1 yes)'
      required: false
      schema:
        type: integer
        default: 0
    ParserCropDewarp:
      name: parser_crop_dewarp
      in: query
      description: 'Crop and dewarp (0 no, 1 yes)'
      required: false
      schema:
        type: integer
        default: 0
    ParserApplyMerge:
      name: parser_apply_merge
      in: query
      description: 'Merge cross-page paragraphs and tables (0 no, 1 yes)'
      required: false
      schema:
        type: integer
        default: 1
    ParserFormulaLevel:
      name: parser_formula_level
      in: query
      description: >-
        Formula recognition level (0 recognizes both display and inline
        formulas, 1 recognizes display formulas only, 2 recognizes no formulas)
      required: false
      schema:
        type: integer
        default: 0
    ParserTableTextSplitMode:
      name: parser_table_text_split_mode
      in: query
      description: 'Split text blocks crossed by table lines (0 no, 1 yes)'
      required: false
      schema:
        type: integer
        default: 0
    WithTaskDetailUrl:
      name: with_task_detail_url
      in: query
      description: Whether to return the task details page URL
      required: false
      schema:
        type: boolean
        default: false
  requestBodies:
    FileUploadRequestBody:
      description: File upload request body
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            properties:
              file:
                type: string
                format: binary
        application/json:
          schema:
            type: object
            properties:
              urls:
                description: |
                  File URL list
                  Supports up to 10 file URLs per upload, each file maximum 50MB
                type: array
                items:
                  type: string
                  description: File URL
                  example: 'https://example.com/file.pdf'
                  pattern: '^https?://.*$'
                maxItems: 10
            required:
              - urls
  securitySchemes:
    ApiId:
      type: apiKey
      in: header
      name: x-ti-app-id
    SecretCode:
      type: apiKey
      in: header
      name: x-ti-secret-code
  schemas:
    CodeMessage:
      type: object
      properties:
        code:
          type: integer
          description: Status code
          example: 200
        msg:
          type: string
          description: Status description
      required:
        - code
        - msg
    TaskType:
      type: integer
      description: >
        Task type

        - 0: **File split subtask**: When a file task with "File split" switch
        enabled executes successfully, the subtasks generated by file split
        operations in that file batch task are split subtasks, divided according
        to the actual number of file sets under the file category

        - 1: **Regular task**: File tasks without "File split" and "Multi-image
        crop" switches enabled

        - 2: **Parent task**: After file tasks with "File split" or "Multi-image
        crop" switches enabled execute, each file in that file batch task
        becomes a parent task

        - 3: **Crop subtask**: When a file task with "Multi-image crop" switch
        enabled executes successfully, the subtasks generated by multi-image
        crop operations in that file batch task are crop subtasks, divided
        according to the actual number of crop results under the file category
      example: 1
    RecognitionStatus:
      type: integer
      description: >
        File recognition status: 

        - 0: Pending recognition

        - 1: Recognition successful

        - 2: Recognition failed

        - 3: Classifying

        - 4: Extracting

        - 5: Preparing

        - 6: File splitting

        - 7: Image cropping

        - 10: Classification completed (only available when upload interface
        target_process is classify)

        - 20: Parsing
      enum:
        - 0
        - 1
        - 2
        - 3
        - 4
        - 5
        - 6
        - 7
        - 10
        - 20
    VerificationStatus:
      type: integer
      description: >-
        File verification status 0: Pending verification 2: Confirmed 3:
        Rejected 4: Deleted 5: Deferred processing
      enum:
        - 0
        - 2
        - 3
        - 4
        - 5
    PagesInfo:
      type: array
      description: >
        Data for rendering each page of the file.            Combined with the
        page and position fields in data.fields, you can accurately draw the
        position of fields on the page.
      items:
        type: object
        properties:
          page:
            type: integer
            description: 'Page number, starting from 0'
            example: 1
          angle:
            type: integer
            description: Rotation angle
            enum:
              - 0
              - 90
              - 180
              - 270
          width:
            type: integer
            description: Page width after correction
            example: 1024
          height:
            type: integer
            description: Page height after correction
            example: 1024
          dpi:
            type: integer
            description: >-
              Resolution when converting PDF to image. For non-PDF files, this
              value is 0.
            example: 144
    KeyValuePosition:
      description: >-
        Position of the field value. Field values may span pages or rows, so
        they are displayed as arrays.
      type: array
      items:
        type: object
        properties:
          page:
            type: integer
            description: >-
              Page where the field is located. It is the index of the pages
              array
          vertices:
            type: array
            description: >-
              Bounding quadrilateral coordinates of the field value. The image
              uses the top-left as origin, array values are [top-left x,
              top-left y, top-right x, top-right y, bottom-right x, bottom-right
              y, bottom-left x, bottom-left y]
            items:
              type: integer
            minItems: 8
            maxItems: 8
    FieldRespKeyValue:
      type: object
      properties:
        key:
          type: string
          description: Field name
        identifier:
          type: string
          description: Identifier(from export field name)
        value:
          type: string
          description: Field value
        position:
          $ref: '#/components/schemas/KeyValuePosition'
        confidence:
          type: number
          format: float
          description: 'Confidence score, range 0~1'
          example: 0.95
        extract_model:
          type: string
          description: Actual extraction model used
    KeyValue:
      type: object
      properties:
        key:
          type: string
          description: Field name
        value:
          type: string
          description: Field value
        position:
          $ref: '#/components/schemas/KeyValuePosition'
    TextInLines:
      type: object
      properties:
        angle:
          type: string
          description: Angle
          example: 0
        pos:
          type: array
          description: Coordinates
          items:
            type: integer
            description: Coordinates
            example: 1
        page:
          type: integer
          description: Page number
          example: 1
        text:
          type: string
          description: Text
          example: Text content
        char_pos:
          type: array
          description: Character coordinates
          items:
            type: array
            description: Character coordinates
            items:
              type: integer
              description: Character coordinates
              example: 1
      description: Field coordinates
    CommonFieldDetailRespVO:
      type: object
      properties:
        key:
          type: string
          description: Field key
        identifier:
          type: string
          description: Identifier(from export field name)
        value:
          type: string
          description: Field value
        textInLines:
          deprecated: true
          type: array
          description: |
            **Deprecated**, please use position field instead
            Field coordinates
          items:
            $ref: '#/components/schemas/TextInLines'
        position:
          $ref: '#/components/schemas/KeyValuePosition'
        index:
          type: integer
          description: Index
        confidence:
          type: number
          format: float
          description: 'Confidence score, range 0~1'
          example: 0.95
    StampValue:
      type: object
      properties:
        angel:
          type: integer
          description: Angle
        page:
          type: integer
          description: Page number
        text:
          type: string
          description: Stamp text content
        type:
          type: string
          description: Stamp type
        color:
          type: string
          description: Stamp color
        shape:
          type: string
          description: Stamp shape
        position:
          type: array
          description: Position information
          items:
            type: integer
            example: 1
    HandWritingValue:
      type: object
      properties:
        angel:
          type: integer
          description: Angle
        page:
          type: integer
          description: Page number
        text:
          type: string
          description: Handwriting text content
        position:
          $ref: '#/components/schemas/KeyValuePosition'
    Document:
      type: object
      properties:
        pages:
          type: array
          items:
            type: object
            properties:
              angle:
                type: integer
                description: Page rotation angle
              width:
                type: integer
                description: Page width
              height:
                type: integer
                description: Page height
              lines:
                description: Page text line array
                type: array
                items:
                  type: object
                  properties:
                    text:
                      type: string
                      description: Line text
                    position:
                      type: array
                      items:
                        type: integer
                      minItems: 8
                      maxItems: 8
                    charPositions:
                      type: array
                      items:
                        type: array
                        items:
                          type: integer
                        minItems: 8
                        maxItems: 8
    TaskCropResult:
      type: object
      properties:
        page:
          type: integer
          description: >-
            Page index of the original file, 0 represents the first page of the
            source file
        imageAngle:
          type: string
          description: Angle information of the cropped image
    SubFileDetailInfo:
      type: object
      properties:
        id:
          type: string
          description: File ID
          example: 202412190001
        task_id:
          type: string
          description: Task ID
          example: 202412190001
        task_detail_url:
          type: string
          description: File subtask details page URL
        task_type:
          $ref: '#/components/schemas/TaskType'
        parent_task_id:
          type: string
          description: Parent task ID (meaningful when not 0)
          example: 202412190001
        batch_number:
          type: string
          description: Batch Number
          example: 202412190001
        name:
          type: string
          description: File Name
          example: invoice.pdf
        format:
          type: string
          description: File Format
        recognition_status:
          $ref: '#/components/schemas/RecognitionStatus'
        verification_status:
          $ref: '#/components/schemas/VerificationStatus'
        category:
          type: string
          description: File Category
          example: invoice
        pages:
          $ref: '#/components/schemas/PagesInfo'
        data:
          type: object
          description: Processing result
          properties:
            fields:
              description: Field list
              type: array
              items:
                $ref: '#/components/schemas/FieldRespKeyValue'
              example:
                - key: Invoice Code
                  identifier: Invoice Code Identifier
                  value: '3100231130'
                  position:
                    - page: 0
                      vertices:
                        - 0
                        - 0
                        - 100
                        - 0
                        - 100
                        - 100
                        - 0
                        - 100
                - key: Invoice Number
                  identifier: Invoice Number Identifier
                  value: '28737000'
                  position:
                    - page: 0
                      vertices:
                        - 0
                        - 0
                        - 100
                        - 0
                        - 100
                        - 100
                        - 0
                        - 100
            items:
              description: Table data list
              type: array
              items:
                type: array
                items:
